<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>대성여고 무한 학교계단</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#ff69b4">
  <meta name="mobile-web-app-capable" content="yes">

  <!-- iOS Safari PWA -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="학교계단">
  <link rel="apple-touch-icon" href="icon-192.png">

  <!-- OG / SNS 공유용 (og:image는 절대 URL 필요) -->
  <meta property="og:title" content="대성여고 무한 학교계단">
  <meta property="og:description" content="대성여고 무한 학교계단 — 계단을 올라보세요! 🏫">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://infinite-school-stairs.vercel.app/">
  <meta property="og:image" content="https://infinite-school-stairs.vercel.app/icon-512.png">
  <meta property="og:image:width" content="512">
  <meta property="og:image:height" content="512">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:image" content="https://infinite-school-stairs.vercel.app/icon-512.png">

  <link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

    body {
      background:#0a0010;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100svh; /* svh = 주소창 제외한 실제 모바일 뷰포트 */
      overflow:hidden;
      font-family:'Jua','Apple SD Gothic Neo',sans-serif;
    }

    #wrap {
      position:relative;
      width:100%;
      max-width:420px;
      height:100svh;
      overflow:hidden;
    }

    canvas { display:block; width:100%; height:100%; }

    /* ── HUD ── */
    #hud {
      position:absolute; top:0; left:0; right:0;
      padding:14px 18px 0;
      z-index:5;
      background:linear-gradient(180deg,rgba(0,0,0,.65) 0%,transparent 100%);
    }
    #hudTop { display:flex; justify-content:space-between; align-items:flex-start; gap:10px; }
    #hudLeft { pointer-events:none; flex:1; min-width:0; }
    #hudRight {
      display:flex; flex-direction:column; align-items:flex-end; gap:6px;
      flex-shrink:0; pointer-events:none;
    }
    #timeDisplay {
      font-size:clamp(15px,4.2vw,18px); color:#fff;
      letter-spacing:1px; text-shadow:0 1px 4px #000;
      padding:4px 10px; border-radius:20px;
      background:rgba(0,0,0,.35); border:1px solid rgba(255,255,255,.2);
      font-variant-numeric:tabular-nums;
    }
    #timeDisplay.time-warn { color:#ffb74d; border-color:rgba(255,183,77,.5); }
    #timeDisplay.time-crit {
      color:#ff5252; border-color:rgba(255,82,82,.6);
      animation:timePulse .6s ease-in-out infinite alternate;
    }
    @keyframes timePulse {
      from { box-shadow:0 0 0 rgba(255,82,82,0); }
      to   { box-shadow:0 0 14px rgba(255,82,82,.55); }
    }
    #stageName { font-size:clamp(11px,3vw,13px); color:#ffe066; letter-spacing:2px; text-shadow:0 1px 4px #000; }
    #scoreDisplay {
      font-size:clamp(44px,14vw,68px); line-height:1; color:#fff;
      text-shadow:3px 3px 0 #000, 0 0 30px rgba(255,255,255,.25);
    }
    #livesRow { display:flex; align-items:center; gap:8px; margin-top:2px; }
    #livesDisplay { font-size:clamp(18px,5.5vw,24px); letter-spacing:2px; }
    #comboDisplay { font-size:clamp(13px,3.5vw,15px); color:#ffe066; min-height:18px; text-shadow:0 1px 4px #000; }

    /* Mute button */
    #muteBtn {
      width:40px; height:40px; margin:0;
      border:1.5px solid rgba(255,255,255,.3);
      border-radius:50%;
      background:rgba(0,0,0,.35);
      backdrop-filter:blur(8px);
      color:#fff; font-size:18px;
      cursor:pointer; flex-shrink:0;
      display:flex; align-items:center; justify-content:center;
      transition:background .15s;
      pointer-events:all;
    }
    #muteBtn:active { background:rgba(255,105,180,.5); transform:scale(.9); }

    /* ── Controls ── */
    #controls {
      position:absolute; bottom:0; left:0; right:0;
      height:clamp(100px,17svh,130px); display:flex; gap:8px; padding:10px;
      background:linear-gradient(0deg,rgba(0,0,0,.7) 0%,transparent 100%);
      z-index:5;
    }
    .ctrl-btn {
      flex:1; height:100%;
      border:2px solid rgba(255,255,255,.25);
      border-radius:18px;
      background:rgba(255,255,255,.08);
      backdrop-filter:blur(12px);
      color:#fff; font-size:clamp(20px,6.5vw,28px);
      font-family:'Jua',sans-serif;
      cursor:pointer;
      display:flex; flex-direction:column;
      align-items:center; justify-content:center; gap:3px;
      transition:all .1s; user-select:none; -webkit-user-select:none;
    }
    .ctrl-btn span.hint { font-size:clamp(9px,2.5vw,11px); opacity:.4; }
    .ctrl-btn:active, .ctrl-btn.pressed {
      background:rgba(255,105,180,.45);
      border-color:#ff69b4;
      transform:scale(.95);
      box-shadow:0 0 24px rgba(255,105,180,.5);
    }

    /* ── Panels ── */
    .panel {
      position:absolute; inset:0;
      display:flex; flex-direction:column;
      align-items:center; justify-content:center;
      z-index:10;
    }

    /* Start */
    #startScreen { background:linear-gradient(180deg,#1a0533 0%,#0d0d2b 100%); }
    @keyframes glow {
      from { text-shadow:0 0 12px #ff69b4; }
      to   { text-shadow:0 0 35px #ff69b4, 0 0 70px #ff1493; }
    }
    @keyframes bounce {
      0%,100% { transform:translateY(0); }
      50%      { transform:translateY(-9px); }
    }
    @keyframes fadeUp {
      from { opacity:0; transform:translateY(22px); }
      to   { opacity:1; transform:translateY(0); }
    }
    .glow-title {
      animation:glow 2s ease-in-out infinite alternate;
      color:#fff;
    }
    #startScreen .sub  { font-size:clamp(11px,3vw,13px); color:rgba(255,255,255,.4); letter-spacing:3px; }
    #startScreen .main { font-size:clamp(30px,9vw,44px); margin:6px 0; }
    #startScreen .eng  { font-size:clamp(10px,2.8vw,12px); color:rgba(255,255,255,.3); margin-bottom:clamp(24px,5svh,40px); }
    .start-btn {
      padding:15px 55px;
      background:linear-gradient(135deg,#ff69b4,#ff1493);
      border:none; border-radius:50px;
      color:#fff; font-size:22px;
      font-family:'Jua',sans-serif;
      cursor:pointer;
      box-shadow:0 6px 24px rgba(255,105,180,.55);
      animation:bounce 1.6s ease-in-out infinite;
    }
    .start-btn:active { transform:scale(.95); }
    .key-guide { font-size:12px; color:rgba(255,255,255,.25); margin-top:20px; }

    /* 메인화면 버튼 묶음 */
    .main-btns {
      display:flex; flex-direction:column;
      align-items:center; gap:14px;
    }
    .record-btn {
      padding:13px 52px;
      background:transparent;
      border:2px solid rgba(255,105,180,.55);
      border-radius:50px;
      color:#ff69b4; font-size:20px;
      font-family:'Jua',sans-serif;
      cursor:pointer;
      transition:all .2s;
      letter-spacing:1px;
    }
    .record-btn:hover  { background:rgba(255,105,180,.12); }
    .record-btn:active { background:rgba(255,105,180,.25); transform:scale(.95); }

    /* 기록보기 패널 */
    #recordScreen { background:rgba(0,0,0,.88); backdrop-filter:blur(14px); }
    .rec-panel {
      width:90%; max-width:370px;
      background:linear-gradient(135deg,rgba(18,0,36,.97),rgba(0,8,28,.97));
      border:1px solid rgba(255,105,180,.35);
      border-radius:26px;
      padding:22px 20px 18px;
      box-shadow:0 0 60px rgba(255,105,180,.18);
      animation:fadeUp .4s ease;
    }
    .rec-title {
      font-size:clamp(20px,5.5vw,24px);
      color:#ffe066; text-align:center;
      text-shadow:0 0 14px #ffe066;
      margin-bottom:14px;
    }
    .back-btn {
      width:100%; margin-top:12px; padding:13px;
      background:rgba(255,105,180,.12);
      border:1px solid rgba(255,105,180,.35);
      border-radius:14px;
      color:#fff; font-size:17px;
      font-family:'Jua',sans-serif;
      cursor:pointer; transition:background .2s;
    }
    .back-btn:hover  { background:rgba(255,105,180,.25); }
    .back-btn:active { transform:scale(.98); }

    /* Game Over */
    #gameOverScreen {
      background:rgba(0,0,0,.82); backdrop-filter:blur(12px);
      overflow-y:auto;            /* 패널이 화면보다 길면 스크롤 */
      padding:10px 0;
      justify-content:flex-start; /* flex-start + margin:auto 조합으로 중앙정렬 유지 */
    }
    .go-panel {
      width:90%; max-width:370px;
      background:linear-gradient(135deg,rgba(18,0,36,.97),rgba(0,8,28,.97));
      border:1px solid rgba(255,105,180,.35);
      border-radius:26px;
      padding:clamp(14px,3svh,18px) 18px clamp(12px,2.5svh,16px);
      box-shadow:0 0 60px rgba(255,105,180,.2), inset 0 0 40px rgba(255,255,255,.02);
      animation:fadeUp .45s ease;
      margin:auto;      /* 공간 있으면 수직 중앙, 없으면 위에서 쌓임 */
      flex-shrink:0;    /* 압축되지 않도록 */
    }
    .go-title { font-size:clamp(20px,5.5vw,26px); color:#ff69b4; text-align:center; text-shadow:0 0 18px #ff69b4; margin-bottom:4px; }
    .go-score-label { text-align:center; color:rgba(255,255,255,.55); font-size:clamp(11px,2.8vw,12px); }
    .go-score-value { text-align:center; font-size:clamp(32px,9vw,42px); color:#ffe066; line-height:1.1; text-shadow:0 0 14px #ffe066; margin-bottom:4px; }
    .go-stage { text-align:center; font-size:clamp(11px,2.8vw,12px); color:rgba(255,255,255,.4); margin-bottom:clamp(8px,1.5svh,12px); }

    .name-row { display:flex; flex-direction:column; gap:10px; margin-bottom:6px; }
    .name-row input {
      width:100%; padding:12px 14px;
      background:rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.18);
      border-radius:12px;
      color:#fff; font-size:16px;
      font-family:'Jua',sans-serif;
      outline:none;
    }
    .name-row input:focus { border-color:#ff69b4; }
    .name-row input::placeholder { color:rgba(255,255,255,.3); }
    .pink-btn {
      width:100%; padding:13px;
      background:linear-gradient(135deg,#ff69b4,#ff1493);
      border:none; border-radius:12px;
      color:#fff; font-size:17px;
      font-family:'Jua',sans-serif;
      cursor:pointer;
      box-shadow:0 3px 12px rgba(255,20,147,.4);
    }
    .pink-btn:active { transform:scale(.95); }

    #recordTime { text-align:center; font-size:11px; color:rgba(255,255,255,.3); margin-bottom:10px; }

    .rank-header {
      display:flex; justify-content:space-between; align-items:center;
      margin-bottom:8px;
    }
    .rank-header span:first-child { font-size:14px; color:#ffe066; }
    #myRankText { font-size:12px; color:#ff69b4; }

    .rank-scroll { max-height:clamp(100px,20svh,150px); overflow-y:auto; }
    .rank-scroll::-webkit-scrollbar { width:4px; }
    .rank-scroll::-webkit-scrollbar-track { background:rgba(255,255,255,.04); }
    .rank-scroll::-webkit-scrollbar-thumb { background:#ff69b4; border-radius:2px; }

    table { width:100%; border-collapse:collapse; font-size:13px; color:rgba(255,255,255,.88); }
    thead th {
      color:#ff69b4; padding:5px 4px;
      border-bottom:1px solid rgba(255,105,180,.25);
      font-size:11px; text-align:left;
    }
    tbody td { padding:7px 4px; border-bottom:1px solid rgba(255,255,255,.06); }
    tbody tr.mine td { color:#ffe066; }
    .rk1 { color:#FFD700; font-size:15px; }
    .rk2 { color:#C0C0C0; font-size:14px; }
    .rk3 { color:#CD7F32; font-size:13px; }

    .retry-btn {
      width:100%; margin-top:10px; padding:12px;
      background:rgba(255,105,180,.15);
      border:1px solid rgba(255,105,180,.35);
      border-radius:14px;
      color:#fff; font-size:18px;
      font-family:'Jua',sans-serif;
      cursor:pointer;
      transition:background .2s;
    }
    .retry-btn:hover { background:rgba(255,105,180,.28); }
    .retry-btn:active { transform:scale(.98); }

    .hidden { display:none !important; }

    /* ── 작은 화면 (iPhone SE 375x667 이하) 추가 조정 ── */
    @media (max-height: 650px) {
      #hud { padding:8px 14px 0; }
      #scoreDisplay { font-size:40px; }
      #controls { height:90px; }
      .ctrl-btn { font-size:20px; }
      .go-score-value { font-size:30px; }
      .go-panel { padding:12px 16px; }
      .rank-scroll { max-height:90px; }
      .retry-btn { padding:10px; font-size:16px; margin-top:8px; }
      .name-row input { padding:9px 12px; font-size:14px; }
      .pink-btn { padding:9px 12px; font-size:13px; }
    }

    /* ── 매우 좁은 화면 (320px 이하) ── */
    @media (max-width: 360px) {
      #scoreDisplay { font-size:38px; }
      .ctrl-btn { font-size:18px; }
      #startScreen .main { font-size:28px; }
    }
  </style>
</head>
<body>
<div id="wrap">
  <canvas id="c"></canvas>

  <!-- HUD -->
  <div id="hud" class="hidden">
    <div id="hudTop">
      <div id="hudLeft">
        <div id="stageName">🏫 초등학교</div>
        <div id="scoreDisplay">0</div>
        <div id="livesRow">
          <div id="livesDisplay">❤️❤️❤️</div>
          <div id="comboDisplay"></div>
        </div>
      </div>
      <div id="hudRight">
        <div id="timeDisplay">⏱ 2:30</div>
        <button id="muteBtn" title="소리 켜기/끄기">🔊</button>
      </div>
    </div>
  </div>

  <!-- Controls -->
  <div id="controls" class="hidden">
    <button class="ctrl-btn" id="btnL">↩️<span class="hint">← / Z 방향전환</span></button>
    <button class="ctrl-btn" id="btnR">🦶<span class="hint">→ / X 올라가기</span></button>
  </div>

  <!-- Start Screen -->
  <div class="panel" id="startScreen">
    <div style="text-align:center; animation:fadeUp .9s ease;">
      <div id="startCharCanvas" style="height:100px; position:relative; margin-bottom:10px;"></div>
      <div class="sub glow-title">대성여고</div>
      <div class="main glow-title">무한 학교계단</div>
      <div class="eng">Infinite School Stairs</div>
    </div>
    <div class="main-btns">
      <button class="start-btn" id="startBtn">🚀 게임시작</button>
      <button class="record-btn" id="recordBtn">🏆 기록보기</button>
    </div>
    <div class="key-guide">→/X 올라가기 &nbsp;|&nbsp; ←/Z 방향전환</div>
    <div class="key-guide" style="margin-top:6px">⏱ 한 판 <strong style="color:rgba(255,230,102,.85)">2분 30초</strong> (타임어택)</div>
    <div style="text-align:center; margin-top:14px; font-size:13px; color:rgba(255,255,255,.45); letter-spacing:2px;">- 정보쌤 제작 -</div>
  </div>

  <!-- Records Screen -->
  <div class="panel hidden" id="recordScreen">
    <div class="rec-panel">
      <div class="rec-title">🏆 명예의 전당</div>
      <div class="rank-scroll" style="max-height:clamp(260px,55svh,400px)">
        <table>
          <thead><tr><th>#</th><th>이름</th><th>점수</th><th>날짜·시간</th></tr></thead>
          <tbody id="mainRankList"></tbody>
        </table>
      </div>
      <button class="back-btn" id="backBtn">← 돌아가기</button>
    </div>
  </div>

  <!-- Game Over -->
  <div class="panel hidden" id="gameOverScreen">
    <div class="go-panel">
      <div class="go-title" id="goTitle">💔 GAME OVER</div>
      <div class="go-score-label">최종 점수</div>
      <div class="go-score-value" id="finalScore">0</div>
      <div class="go-stage" id="finalStage"></div>

      <div class="name-row" id="inputArea">
        <input type="text" id="playerName" placeholder="닉네임을 입력하세요" maxlength="6" autocomplete="off">
        <button class="pink-btn" id="saveBtn">저장 💾</button>
      </div>
      <div id="recordTime"></div>

      <div id="boardArea">
        <div class="rank-header">
          <span>🏆 TOP 10</span>
          <span id="myRankText"></span>
        </div>
        <div class="rank-scroll">
          <table>
            <thead><tr><th>#</th><th>이름</th><th>점수</th><th>날짜·시간</th></tr></thead>
            <tbody id="rankList"></tbody>
          </table>
        </div>
        <button class="retry-btn" id="retryBtn">🏠 홈화면으로</button>
      </div>
    </div>
  </div>
</div>

<script>
/* ─────────────────────────────────────────
   FIREBASE  (공유 랭킹 – REST API 직접 사용)
───────────────────────────────────────── */
/* Firebase SDK 제거 → fetch()로 직접 통신 (index 오류 없음) */
const DB_URL = "https://school-stair-default-rtdb.asia-southeast1.firebasedatabase.app";

/* ─────────────────────────────────────────
   SOUND SYSTEM  (Web Audio API – no files)
───────────────────────────────────────── */
let _ac       = null;
let _bgmGain  = null;
let _sfxGain  = null;
let isMuted   = false;
let bgmTimer  = null;
let bgmStep   = 0;

function getAC() {
  if (!_ac) {
    _ac = new (window.AudioContext || window.webkitAudioContext)();
    _bgmGain = _ac.createGain(); _bgmGain.gain.value = 0.11; _bgmGain.connect(_ac.destination);
    _sfxGain = _ac.createGain(); _sfxGain.gain.value = 0.50; _sfxGain.connect(_ac.destination);
  }
  if (_ac.state === 'suspended') _ac.resume();
  return _ac;
}

// Core tone player
function tone(freq, dur, wave, gainNode, vol, when) {
  if (isMuted || !freq || freq <= 0) return;
  const ac  = getAC();
  const osc = ac.createOscillator();
  const g   = ac.createGain();
  osc.type = wave || 'sine';
  osc.frequency.value = freq;
  osc.connect(g);
  g.connect(gainNode || _sfxGain);
  const t = ac.currentTime + (when || 0);
  g.gain.setValueAtTime(vol || 0.4, t);
  g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
  osc.start(t);
  osc.stop(t + dur + 0.02);
}

// ── SFX ──
function sfxStep(combo) {
  // Pitch rises with combo for satisfying feedback
  const base = 440 + Math.min(combo, 20) * 28;
  tone(base,       0.07, 'triangle', null, 0.35);
  tone(base * 1.5, 0.05, 'sine',     null, 0.18, 0.04);
}

function sfxMiss() {
  tone(200, 0.06, 'square',   null, 0.4);
  tone(130, 0.18, 'sawtooth', null, 0.35, 0.05);
}

function sfxGameOver() {
  [880, 698, 587, 440, 349, 262].forEach((f, i) => {
    tone(f, 0.32, 'sine', null, 0.38, i * 0.16);
  });
  // Low boom
  tone(80, 0.6, 'square', null, 0.2, 0.5);
}

function sfxStageUp() {
  [523, 659, 784, 1047, 1319].forEach((f, i) => {
    tone(f, 0.14, 'triangle', null, 0.32, i * 0.08);
  });
}

function sfxComboMilestone() {
  [523, 659, 784, 1047].forEach((f, i) => {
    tone(f, 0.1, 'sine', null, 0.25, i * 0.055);
  });
}

function sfxStart() {
  [330, 440, 550, 660].forEach((f, i) => {
    tone(f, 0.12, 'triangle', null, 0.28, i * 0.07);
  });
}

// ── BGM (procedural chip-music) ──
// Notes: frequency in Hz, 0 = rest
const N = {
  A3:220, B3:247, C4:262, D4:294, E4:330, F4:349, G4:392, A4:440, B4:494,
  C5:523, D5:587, E5:659, F5:698, G5:784, A5:880, B5:988,
  _: 0
};

// Each stage: bpm, melody (top) + bass (bottom)  –  8th-note steps
const BGM = [
  { // 0: 초등학교 – bright C major, Mario-ish
    bpm: 168,
    mel: [N.E5,N._,N.G5,N.E5, N.C5,N.D5,N.E5,N._, N.F5,N.E5,N.D5,N._, N.C5,N._,N._,N._],
    bas: [N.C4,N._,N.C4,N._, N.A4,N._,N.A4,N._, N.F4,N._,N.F4,N._, N.G4,N._,N.G4,N._],
  },

  },
];

function startBGM() {
  stopBGM();
  bgmStep = 0;
  scheduleBGM();
}

function stopBGM() {
  if (bgmTimer) { clearTimeout(bgmTimer); bgmTimer = null; }
}

function scheduleBGM() {
  if (isMuted || gs !== 'playing') return;
  const track = BGM[stageIdx];
  const step  = bgmStep % track.mel.length;
  const mFreq = track.mel[step];
  const bFreq = track.bas[step];
  const beat  = (60 / track.bpm) * 0.5 * 1000; // 8th note ms
  const dur   = beat / 1000 * 0.42;

  tone(mFreq, dur,      'triangle', _bgmGain, 0.55);
  tone(bFreq, dur*1.4,  'sine',     _bgmGain, 0.35);

  bgmStep++;
  bgmTimer = setTimeout(scheduleBGM, beat);
}

// ── Mute toggle ──
function toggleMute() {
  isMuted = !isMuted;
  document.getElementById('muteBtn').textContent = isMuted ? '🔇' : '🔊';
  if (isMuted) {
    stopBGM();
    if (_bgmGain) _bgmGain.gain.value = 0;
    if (_sfxGain) _sfxGain.gain.value = 0;
  } else {
    if (_bgmGain) _bgmGain.gain.value = 0.11;
    if (_sfxGain) _sfxGain.gain.value = 0.50;
    if (gs === 'playing') scheduleBGM();
  }
}

/* ─────────────────────────────────────────
   CONFIG

const STEP_X  = 60;
const STEP_Y  = 60;
const STAIR_W = 92;
const STAIR_H = 14;
const STAIR_COUNT = 14;
const LS_KEY  = 'stairs_v5';
const COMBO_BONUS_EVERY = 5; // 연속 성공 N회마다 추가 점수 +1

const STARS = Array.from({length:90}, (_,i) => ({
  x: (i * 137.508) % 420,
  y: (i * 97.123)  % 900,
  r: (i % 9 === 0) ? 2 : 1,
  spd: 0.15 + (i % 4) * 0.12,
}));

/* ─────────────────────────────────────────

function resize() {

/* ─────────────────────────────────────────
   START GAME
───────────────────────────────────────── */
function startGame() {
  if (gs === 'playing' || gs === 'ending') return;
  getAC(); // Initialize audio context on user gesture
  sfxStart();
  score = 0; lives = 3; combo = 0; stageIdx = 0;
  stageFlash = 0; shakeMag = 0; savedScore = null;
  timeLeft = GAME_TIME_LIMIT;
  timerLastTs = 0;
  gameOverReason = 'lives';
  particles = [];

  pReal.x   = W / 2;
  pReal.y   = H * 0.65;
  pReal.dir = 1;
  pVisual.x = pReal.x;
  pVisual.y = pReal.y;
  pVisual.hop = 0;
  pVisual.walkF = 0;
  pVisual.faceDir = 1;
  pVisual.turnSquish = 0;

  stairs = [{ x: pReal.x, y: pReal.y }];
  for (let i = 0; i < STAIR_COUNT; i++) addStair();

  gs = 'playing';
  show('hud'); show('controls');
  hide('startScreen'); hide('gameOverScreen');
  updateHUD();
  startBGM();
}

/* ─────────────────────────────────────────
   STAIR GENERATION
───────────────────────────────────────── */
function addStair() {
  const last = stairs[stairs.length - 1];
  let dir = Math.random() > .5 ? 1 : -1;
  let nx  = last.x + dir * STEP_X;
  if (nx < 65 || nx > W - 65) nx = last.x - dir * STEP_X;
  stairs.push({ x: nx, y: last.y - STEP_Y });
}

/* ─────────────────────────────────────────
   MOVE LOGIC
───────────────────────────────────────── */
function move(direction) { // -1 = 방향전환(left btn), 1 = 앞으로(right btn)
  if (gs !== 'playing') return;

  const next    = stairs[1];
  const nextDir = next.x > pReal.x ? 1 : -1;

  // 오른쪽 버튼 = 현재 방향으로 전진, 왼쪽 버튼 = 반대 방향으로 전환
  const attempt = direction === 1 ? pReal.dir : -pReal.dir;

  flashBtn(direction === -1 ? 'btnL' : 'btnR');

  if (attempt === nextDir) {
    // ✅ Correct!
    score++;
    combo++;
    pReal.x   = next.x;
    pReal.dir = attempt;

    stairs.shift();
    addStair();
    stairs.forEach(s => s.y += STEP_Y);

    pVisual.hop = -28;  // 높이 올려서 깡총 더 잘 보이게
    sfxStep(combo);
    if (combo % COMBO_BONUS_EVERY === 0) {
      score++;
      sfxComboMilestone();
      spawnParticles(pVisual.x, pVisual.y, '#ffe066', 14);
    } else {
      spawnParticles(pVisual.x, pVisual.y, '#ff69b4', 9);
    }
    checkStage();
    updateHUD();
  } else {
    // ❌ Wrong!
    combo = 0;
    lives--;
    shakeMag = 14;
    sfxMiss();
    spawnParticles(pVisual.x, pVisual.y, '#ff4444', 7);
    updateHUD();

    if (lives <= 0) {
      endGame('lives');
    }
  }
}

function formatTime(sec) {
  const s = Math.max(0, Math.ceil(sec));
  const m = Math.floor(s / 60);
  const r = s % 60;
  return `${m}:${String(r).padStart(2, '0')}`;
}

function updateTimeHUD() {
  const el  = document.getElementById('timeDisplay');
  const sec = Math.ceil(timeLeft);
  el.textContent = `⏱ ${formatTime(sec)}`;
  el.classList.toggle('time-warn', sec <= 30 && sec > 10);
  el.classList.toggle('time-crit', sec <= 10);
}

function updateTimer(ts) {
  if (gs !== 'playing') return;
  if (!timerLastTs) timerLastTs = ts;
  timeLeft -= (ts - timerLastTs) / 1000;
  timerLastTs = ts;

  if (timeLeft <= 0) {
    timeLeft = 0;
    updateTimeHUD();
    endGame('time');
    return;
  }
  updateTimeHUD();
}

function endGame(reason) {
  if (gs !== 'playing') return;
  gameOverReason = reason;
  gs = 'ending';
  stopBGM();
  setTimeout(() => showGameOver(reason), 450);
}

/* ─────────────────────────────────────────
   STAGE TRANSITION
───────────────────────────────────────── */
function checkStage() {
  const ni = STAGES.reduce((a, s, i) => score >= s.min ? i : a, 0);
  if (ni !== stageIdx) {
    stageIdx = ni;
    stageFlash = 1;
    sfxStageUp();
    bgmStep = 0; // Restart BGM pattern for new stage
  }
}

/* ─────────────────────────────────────────
   HUD
───────────────────────────────────────── */
function updateHUD() {
  document.getElementById('stageName').textContent   = STAGES[stageIdx].name;
  document.getElementById('scoreDisplay').textContent = score;
  document.getElementById('livesDisplay').textContent =
    '❤️'.repeat(lives) + '🖤'.repeat(3 - lives);
  let comboText = '';
  if (combo >= COMBO_BONUS_EVERY && combo % COMBO_BONUS_EVERY === 0) {
    comboText = `🔥 ${combo} COMBO! +1 보너스`;
  } else if (combo >= 3) {
    comboText = `🔥 ${combo} COMBO!`;
  }
  document.getElementById('comboDisplay').textContent = comboText;
  if (gs === 'playing') updateTimeHUD();
}

/* ─────────────────────────────────────────
   GAME OVER / RANKING
───────────────────────────────────────── */
function showGameOver(reason) {
  gs = 'gameover';
  stopBGM();
  sfxGameOver();
  hide('hud'); hide('controls');
  show('gameOverScreen');

  const isTime = reason === 'time';
  document.getElementById('goTitle').textContent =
    isTime ? '⏱ 시간 종료!' : '💔 GAME OVER';
  document.getElementById('finalScore').textContent = score;
  document.getElementById('finalStage').textContent = isTime
    ? `도달 스테이지: ${STAGES[stageIdx].name} · 제한 시간 2분 30초`
    : `도달 스테이지: ${STAGES[stageIdx].name}`;

  show('inputArea');
  document.getElementById('playerName').value = '';
  document.getElementById('myRankText').textContent = '';

  const now = new Date();
  const fmt = (n) => String(n).padStart(2,'0');
  document.getElementById('recordTime').textContent =
    `📅 ${now.getFullYear()}.${fmt(now.getMonth()+1)}.${fmt(now.getDate())} ` +
    `${fmt(now.getHours())}:${fmt(now.getMinutes())}`;

  showRanking(); // 저장 전 현재 랭킹 미리 표시
}

document.getElementById('saveBtn').addEventListener('click', saveScore);
document.getElementById('retryBtn').addEventListener('click', resetGame);

function escapeHtml(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

function sanitizeName(raw) {
  const s = String(raw).trim().slice(0, 6).replace(/[<>&"'`]/g, '');
  return s || '익명';
}

async function loadRankings() {
  try {
    const res  = await fetch(`${DB_URL}/rankings.json`);
    const data = await res.json();
    if (data && typeof data === 'object') {
      const rankings = Object.values(data);
      rankings.sort((a, b) => b.score - a.score);
      return rankings.slice(0, 10);
    }
    return [];
  } catch (e) {
    console.warn('Firebase 로드 실패, 로컬 랭킹 표시:', e);
    return JSON.parse(localStorage.getItem(LS_KEY) || '[]');
  }
}

function rankRowHtml(r, i, { myName, myScore } = {}) {
  const isMe = myName && r.name === myName && r.score === myScore;
  const medals  = ['🥇', '🥈', '🥉'];
  const rkClass = ['rk1', 'rk2', 'rk3'];
  const medalEl = i < 3
    ? `<span class="${rkClass[i]}">${medals[i]}</span>`
    : `<span>${i + 1}</span>`;
  const name  = escapeHtml(r.name ?? '');
  const date  = escapeHtml(r.date ?? '');
  const score = Number(r.score) || 0;
  return `<tr${isMe ? ' class="mine"' : ''}>
    <td>${medalEl}</td>
    <td>${name}</td>
    <td><strong>${score}</strong></td>
    <td style="font-size:11px;opacity:.65">${date}</td>
  </tr>`;
}

function renderRankTableBody(tbodyId, rankings, opts = {}) {
  const empty =
    `<tr><td colspan="4" style="text-align:center;padding:14px;color:rgba(255,255,255,.35)">아직 기록이 없어요! 첫 주인공이 되세요 🏆</td></tr>`;
  document.getElementById(tbodyId).innerHTML = rankings.length
    ? rankings.map((r, i) => rankRowHtml(r, i, opts)).join('')
    : empty;
}

async function saveScore() {
  const nameEl = document.getElementById('playerName');
  const name   = sanitizeName(nameEl.value);
  nameEl.value = name;
  const now    = new Date();
  const fmt    = (n) => String(n).padStart(2,'0');
  const date   = `${fmt(now.getMonth()+1)}/${fmt(now.getDate())} ${fmt(now.getHours())}:${fmt(now.getMinutes())}`;

  savedScore = { name, score };
  hide('inputArea');

  // 저장 중 표시
  document.getElementById('rankList').innerHTML =
    `<tr><td colspan="4" style="text-align:center;padding:14px;color:rgba(255,255,255,.4)">💾 저장 중...</td></tr>`;

  try {
    // Firebase REST API – SDK 없이 직접 fetch (index 오류 없음)
    const res = await fetch(`${DB_URL}/rankings.json`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, score, date, ts: Date.now() })
    });
    if (!res.ok) throw new Error('write failed');
  } catch(e) {
    console.warn('Firebase 저장 실패, 로컬 저장으로 대체:', e);
    let local = JSON.parse(localStorage.getItem(LS_KEY) || '[]');
    local.push({ name, score, date });
    local.sort((a,b) => b.score - a.score);
    localStorage.setItem(LS_KEY, JSON.stringify(local.slice(0,10)));
  }

  await showRanking(name, score);
}

async function showRanking(myName, myScore) {
  if (!myName) {
    document.getElementById('rankList').innerHTML =
      `<tr><td colspan="4" style="text-align:center;padding:14px;color:rgba(255,255,255,.4)">📡 불러오는 중...</td></tr>`;
  }

  const rankings = await loadRankings();
  renderRankTable(rankings, myName, myScore);
}

function renderRankTable(rankings, myName, myScore) {
  let myRank = -1;
  if (myName) {
    rankings.forEach((r, i) => {
      if (myRank < 0 && r.name === myName && r.score === myScore) myRank = i + 1;
    });
  }

  renderRankTableBody('rankList', rankings, { myName, myScore });
  document.getElementById('myRankText').textContent =
    myRank > 0 ? `✨ 내 순위: ${myRank}위` : '';
}

function resetGame() {
  hide('gameOverScreen');
  show('startScreen');
  gs = 'start';
}

/* ─────────────────────────────────────────
   PARTICLES
───────────────────────────────────────── */
function spawnParticles(x, y, col, n) {
  for (let i = 0; i < n; i++) {
    const ang = (Math.PI*2/n)*i + Math.random()*.5;
    const spd = 2 + Math.random()*3;
    particles.push({
      x, y,
      vx: Math.cos(ang)*spd,
      vy: Math.sin(ang)*spd - 2.5,
      life: 1,
      col,
      sz: 3 + Math.random()*4,
    });
  }
}

function drawParticles() {
  particles = particles.filter(p => p.life > 0);
  particles.forEach(p => {
    ctx.globalAlpha = p.life;
    ctx.fillStyle   = p.col;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.sz * p.life, 0, Math.PI*2);
    ctx.fill();
    p.x    += p.vx;
    p.y    += p.vy;
    p.vy   += .12;
    p.life -= .045;
  });
  ctx.globalAlpha = 1;
}

/* ─────────────────────────────────────────
   BACKGROUND DRAWING
───────────────────────────────────────── */
function drawBG() {
  const s = STAGES[stageIdx];

  // Sky gradient
  const g = ctx.createLinearGradient(0, 0, 0, H * .76);
  g.addColorStop(0, s.skyA);
  g.addColorStop(1, s.skyB);
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, W, H);

  // Theme-specific scene
  drawScene(s.theme);

  // Ground
  ctx.globalAlpha = 1;
  ctx.fillStyle = s.gnd;
  ctx.fillRect(0, H * .75, W, H * .07);
  ctx.fillStyle = s.gnd2;
  ctx.fillRect(0, H * .82, W, H * .18);

  // 지면 상단 디테일 (스테이지별)
  if (s.theme === 4) {
    // 회사: 아스팔트 도로 선
    ctx.fillStyle = s.gnd2;
    ctx.fillRect(0, H*.75, W, H*.07);
    ctx.fillStyle = 'rgba(255,255,255,.18)';
    for (let i = 0; i < W; i += 32) ctx.fillRect(i, H*.78, 18, 3);
  } else if (s.theme === 5) {
    // 가정: 흙길
    ctx.fillStyle = '#A0785A';
    ctx.fillRect(W*.3, H*.75, W*.4, H*.07);
  } else {
    // 나머지: 잔디 끝
    ctx.fillStyle = s.gnd;
    for (let i = 0; i < W; i += 8) {
      ctx.fillRect(i, H * .75 - 5, 3, 8);
    }
  }
}

function drawScene(theme) {
  ctx.save();
  switch(theme) {
    case 0: drawElementary(); break;
    case 1: drawMiddle();     break;
    case 2: drawHighSchool(); break;
    case 3: drawUniversity(); break;
    case 4: drawCompany();    break;
    case 5: drawHome();       break;
  }
  ctx.restore();
}

// ── 초등학교 ─ 맑은 낮, 알록달록 운동장
function drawElementary() {
  // 태양 후광
  const sg = ctx.createRadialGradient(W*.82, H*.1, 0, W*.82, H*.1, 70);
  sg.addColorStop(0,'rgba(255,240,80,1)'); sg.addColorStop(.45,'rgba(255,210,30,.5)'); sg.addColorStop(1,'rgba(255,180,0,0)');
  ctx.globalAlpha = .95; ctx.fillStyle = sg;
  ctx.beginPath(); ctx.arc(W*.82, H*.1, 70, 0, Math.PI*2); ctx.fill();
  // 태양 본체
  ctx.globalAlpha = 1; ctx.fillStyle = '#FFD700';
  ctx.beginPath(); ctx.arc(W*.82, H*.1, 30, 0, Math.PI*2); ctx.fill();
  // 태양 광선
  ctx.strokeStyle = 'rgba(255,220,30,.85)'; ctx.lineWidth = 3.5;
  for (let a = 0; a < Math.PI*2; a += Math.PI/7) {
    ctx.beginPath();
    ctx.moveTo(W*.82+Math.cos(a)*34, H*.1+Math.sin(a)*34);
    ctx.lineTo(W*.82+Math.cos(a)*52, H*.1+Math.sin(a)*52);
    ctx.stroke();
  }
  // 구름
  ctx.globalAlpha = .95;
  drawCloud(W*.2, H*.09, 72); drawCloud(W*.58, H*.06, 55); drawCloud(W*.42, H*.17, 42);
  // 학교 건물
  ctx.globalAlpha = .85;
  drawSchoolBuilding(W*.5, H*.48, 200, 115, '#FFFDE7', '#E53935', true);
  // 국기 게양대
  ctx.globalAlpha = .9; ctx.strokeStyle = '#9E9E9E'; ctx.lineWidth = 2.5;
  ctx.beginPath(); ctx.moveTo(W*.5+85, H*.48-115); ctx.lineTo(W*.5+85, H*.48-150); ctx.stroke();
  ctx.fillStyle = '#E53935'; ctx.fillRect(W*.5+85, H*.48-150, 22, 13);
  ctx.fillStyle = '#1565C0'; ctx.fillRect(W*.5+85, H*.48-137, 22, 6);
  // 나무
  ctx.globalAlpha = .9;
  drawTree(W*.09, H*.55, .9, '#66BB6A'); drawTree(W*.18, H*.57, .7, '#4CAF50');
  drawTree(W*.86, H*.53, .95, '#43A047'); drawTree(W*.94, H*.56, .75, '#2E7D32');

// ── Helpers
function drawCloud(x, y, sz) {
  ctx.fillStyle = 'rgba(255,255,255,.92)';
  ctx.beginPath();
  ctx.arc(x,           y,          sz*.40, 0, Math.PI*2);
  ctx.arc(x+sz*.30,    y-sz*.09,   sz*.30, 0, Math.PI*2);
  ctx.arc(x+sz*.55,    y+sz*.04,   sz*.24, 0, Math.PI*2);
  ctx.arc(x-sz*.24,    y+sz*.05,   sz*.24, 0, Math.PI*2);
  ctx.fill();
}
function drawCloudColored(x, y, sz, col) {
  ctx.fillStyle = col;
  ctx.beginPath();
  ctx.arc(x,           y,          sz*.40, 0, Math.PI*2);
  ctx.arc(x+sz*.30,    y-sz*.09,   sz*.30, 0, Math.PI*2);
  ctx.arc(x+sz*.55,    y+sz*.04,   sz*.24, 0, Math.PI*2);
  ctx.arc(x-sz*.24,    y+sz*.05,   sz*.24, 0, Math.PI*2);
  ctx.fill();
}

function drawTree(x, y, sc, col) {
  ctx.fillStyle = '#8D6E63';
  ctx.fillRect(x - 5*sc, y - 32*sc, 10*sc, 32*sc);
  ctx.fillStyle = col;
  ctx.beginPath(); ctx.arc(x, y - 48*sc, 22*sc, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(x - 8*sc, y - 36*sc, 16*sc, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(x + 8*sc, y - 36*sc, 16*sc, 0, Math.PI*2); ctx.fill();
}

function drawSchoolBuilding(cx, topY, w, h, wallCol, accentCol, hasRoof) {
  // Wall
  ctx.fillStyle = wallCol;
  ctx.fillRect(cx - w/2, topY - h, w, h);
  // Windows
  ctx.fillStyle = 'rgba(100,160,255,.55)';
  const cols = 4, rows = 3;
  const cw = (w - 30) / cols, ch = (h - 30) / rows;
  for (let r = 0; r < rows; r++)
    for (let c = 0; c < cols; c++)
      ctx.fillRect(cx - w/2 + 15 + c*cw, topY - h + 14 + r*ch, cw-8, ch-8);
  // Accent stripe
  ctx.fillStyle = accentCol;
  ctx.fillRect(cx - w/2, topY - h + 4, w, 8);
  // Roof
  if (hasRoof) {
    ctx.fillStyle = accentCol;
    ctx.beginPath();
    ctx.moveTo(cx - w/2 - 6, topY - h);
    ctx.lineTo(cx, topY - h - 32);
    ctx.lineTo(cx + w/2 + 6, topY - h);
    ctx.closePath(); ctx.fill();
  }
  // Door
  ctx.fillStyle = accentCol;
  ctx.fillRect(cx - 15, topY - 30, 30, 30);
  ctx.fillStyle = 'rgba(100,160,255,.4)';
  ctx.fillRect(cx - 12, topY - 28, 12, 28);
  ctx.fillRect(cx + 2, topY - 28, 12, 28);
}

/* ─────────────────────────────────────────
   DRAW STAIRS
───────────────────────────────────────── */
function drawStairs() {
  stairs.forEach((s, i) => {
    const x   = s.x - STAIR_W/2;
    const y   = s.y;
    const cur = i === 0;
    const nxt = i === 1;

    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,.28)';
    ctx.beginPath(); ctx.roundRect(x+4, y+6, STAIR_W, STAIR_H, 5); ctx.fill();

    // Body
    if (cur) {
      ctx.fillStyle = '#a8d8ea';
    } else if (nxt) {
      const p = .65 + .35 * Math.sin(Date.now() * .007);
      ctx.fillStyle = `rgba(255,235,59,${p})`;
    } else {
      ctx.fillStyle = 'rgba(255,255,255,.85)';
    }
    ctx.beginPath(); ctx.roundRect(x, y, STAIR_W, STAIR_H, 5); ctx.fill();

    // Shine
    ctx.fillStyle = 'rgba(255,255,255,.4)';
    ctx.fillRect(x+5, y+2, STAIR_W-10, 3);

    // Arrow on next stair — 눌러야 할 버튼 방향 표시
    if (nxt) {
      const nextDir = stairs[1].x > stairs[0].x ? 1 : -1;
      // nextDir이 현재 방향과 같으면 오른쪽(전진)버튼, 다르면 왼쪽(전환)버튼
      const dir = nextDir === pReal.dir ? 1 : -1;
      ctx.fillStyle = '#ff69b4';
      ctx.save();
      ctx.translate(s.x, s.y - 12);
      ctx.beginPath();
      ctx.moveTo(dir*18, 0);
      ctx.lineTo(dir*6, -7);
      ctx.lineTo(dir*6,  7);
      ctx.closePath();
      ctx.fill();
      ctx.restore();
    }
  });
}

/* ─────────────────────────────────────────
   DRAW CHARACTER
───────────────────────────────────────── */
function drawCharacter(x, y, dir, wF, hop) {
  ctx.save();
  ctx.translate(x, y + hop);

  // ── 방향 전환 스쿼시 (X축 납작 → 반전 직후 통통 튀는 느낌)
  const ts = pVisual.turnSquish;
  const turnFlatX = 1 - Math.sin(ts * Math.PI) * 0.45;  // 전환 순간 X가 납작해짐
  const turnPuffY = 1 + Math.sin(ts * Math.PI) * 0.15;  // 동시에 Y가 약간 늘어남

  // ── 좌우 방향 반전 (-dir: 이미지 기본 방향이 왼쪽이라 반전)
  ctx.scale(-dir * turnFlatX, turnPuffY);

  // ── 진행 방향으로 살짝 앞으로 기울이기 (scale 후라서 항상 전방 기울기)
  ctx.rotate(0.06);

  const baseH  = 115;
  const baseW  = baseH * (charImg.naturalWidth / charImg.naturalHeight || 0.575);

  // ── 그림자: 공중에 뜨면 작아짐 (그림자는 flip 영향 받지 않도록 스케일 보정)
  const airRatio = Math.max(0, -hop / 20);
  const shadowW  = 22 * (1 - airRatio * 0.45);
  const shadowA  = 0.22 * (1 - airRatio * 0.5);
  ctx.fillStyle  = `rgba(0,0,0,${shadowA.toFixed(2)})`;
  ctx.beginPath(); ctx.ellipse(0, 6, shadowW, 5, 0, 0, Math.PI*2); ctx.fill();

  if (!charImg.complete || charImg.naturalHeight === 0) { ctx.restore(); return; }

  // ── 착지 스쿼시/스트레치
  let scaleY = 1, scaleX = 1;
  if (hop < -14) {
    const t = (-hop - 14) / 6;
    scaleY = 1 + t * 0.05; scaleX = 1 - t * 0.03;
  } else if (hop < 0) {
    const t = (-hop) / 14;
    scaleY = 1 - t * 0.04; scaleX = 1 + t * 0.03;
  }

  // ── 걷기 bob (착지 상태에서만)
  const onGround = hop > -3;
  const walkBob  = onGround ? Math.sin(wF * 1.1) * 1.0 : 0;

  // ─────────────────────────────────────
  //  상반신: char.png를 허리(78%)까지만 표시
  // ─────────────────────────────────────
  const CROP    = 0.78;          // 이미지의 상위 78%만 사용
  const bodyH   = baseH * CROP * scaleY;
  const bodyW   = baseW * scaleX;
  const topY    = -baseH * scaleY + walkBob;  // 머리 꼭대기 Y
  const hipY    = topY + bodyH;               // 허리(다리 시작) Y ≈ -25

  ctx.drawImage(
    charImg,
    0, 0, charImg.naturalWidth, charImg.naturalHeight * CROP,  // 소스: 상위 78%
    -bodyW / 2, topY, bodyW, bodyH                              // 목적지
  );

  // ─────────────────────────────────────
  //  하반신: 깡총 점프 다리 (양발 동시)
  // ─────────────────────────────────────
  //  hop < -5 : 공중 (무릎 접어 발 들리기)
  //  hop >= -5: 착지 (다리 펴거나 살짝 구부림)
  drawHopLegs(hipY, hop, scaleX);

  ctx.restore();
}

function drawHopLegs(hipY, hop, scaleX) {
  // airT: hop 값에 비례해 0(착지) → 1(최고점)으로 부드럽게 변함
  const airT = Math.max(0, Math.min(1, -hop / 25));  // hop -28 기준으로 정규화

  // 공중: 허벅지 앞으로 들리고 무릎 굽힘 → 착지: 다리 쭉 펴거나 살짝 스쿼트
  const thighAngle = airT * 0.55;    // 0→ 앞으로 들기 (최대 ~31°)
  const kneeAngle  = -(airT * 0.85); // 0→ 종아리 뒤로 접힘 (최대 ~49°)

  // 왼발(-7), 오른발(+7) 동시 같은 포즈
  [-7, 7].forEach(xOff => {
    drawHopLeg(hipY, xOff * scaleX, thighAngle, kneeAngle);
  });
}

function drawHopLeg(hipY, xOff, thighAngle, kneeAngle) {
  const legLen  = 16;   // 허벅지 길이 (더 길게)
  const calfLen = 13;   // 종아리 길이
  const shoeW   = 13;

  ctx.save();
  ctx.translate(xOff, hipY);
  ctx.rotate(thighAngle);

  // 허벅지 (피부색)
  ctx.fillStyle = '#f5c090';
  ctx.beginPath(); ctx.roundRect(-3.5, 0, 7, legLen, 3); ctx.fill();

  // 종아리 + 신발
  ctx.save();
  ctx.translate(0, legLen);
  ctx.rotate(kneeAngle);

  // 종아리 / 흰 양말
  ctx.fillStyle = '#f0f0f0';
  ctx.beginPath(); ctx.roundRect(-3.5, 0, 7, calfLen, 2); ctx.fill();

  // 신발 (검정)
  ctx.fillStyle = '#222';
  ctx.beginPath(); ctx.roundRect(-5, calfLen - 1, shoeW, 6, [1, 3, 3, 1]); ctx.fill();
  // 신발 광택
  ctx.fillStyle = 'rgba(255,255,255,.18)';
  ctx.beginPath(); ctx.roundRect(-4, calfLen, 6, 2, 1); ctx.fill();

  ctx.restore();
  ctx.restore();
}

/* ─────────────────────────────────────────
   START SCREEN – tiny character preview
───────────────────────────────────────── */
function drawStartChar() {
  if (gs !== 'start') return;
  // Draw a small character on the main canvas as decoration in the start screen
  ctx.save();
  ctx.translate(W*.5, H*.38);
  const sc = .85;
  ctx.scale(sc, sc);
  drawCharacter(0, 0, 1, Date.now()*.003, Math.sin(Date.now()*.002)*5-5);
  ctx.restore();
}

/* ─────────────────────────────────────────
   SCREEN SHAKE + FLASH
───────────────────────────────────────── */
let shakeX = 0, shakeY = 0;

function applyShake() {
  if (shakeMag > .5) {
    shakeX = (Math.random()-.5) * shakeMag;
    shakeY = (Math.random()-.5) * shakeMag;
    shakeMag *= .7;
  } else {
    shakeX = shakeY = shakeMag = 0;
  }
}

function drawFlash() {
  if (stageFlash > 0) {
    ctx.fillStyle = `rgba(255,255,255,${stageFlash * .6})`;
    ctx.fillRect(0, 0, W, H);
    stageFlash -= .055;
  }
}

/* ─────────────────────────────────────────
   VISUAL UPDATE
───────────────────────────────────────── */
function updateVisual() {
  // Smooth horizontal follow
  pVisual.x += (pReal.x - pVisual.x) * .3;
  pVisual.y  = pReal.y;

  // Hop gravity
  pVisual.hop += 2.2;
  if (pVisual.hop > 0) pVisual.hop = 0;

  // Walk animation only when landing
  if (gs === 'playing') pVisual.walkF += .13;

  // 방향 전환 감지 → 스쿼시 트리거
  if (pReal.dir !== pVisual.faceDir) {
    pVisual.faceDir = pReal.dir;
    pVisual.turnSquish = 1.0;  // 1.0 = 전환 직후, 0으로 감쇠
  }
  if (pVisual.turnSquish > 0) pVisual.turnSquish -= 0.18;
  if (pVisual.turnSquish < 0) pVisual.turnSquish = 0;
}

/* ─────────────────────────────────────────
   MAIN GAME LOOP
───────────────────────────────────────── */
function loop(ts) {
  ctx.clearRect(0, 0, W, H);

  if (gs === 'start') {
    // Starfield background
    ctx.fillStyle = '#1a0533';
    ctx.fillRect(0, 0, W, H);
    // Subtle gradient overlay
    const og = ctx.createRadialGradient(W*.5, H*.5, 0, W*.5, H*.5, W);
    og.addColorStop(0,'rgba(80,0,120,.3)'); og.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle = og; ctx.fillRect(0,0,W,H);
    // Stars
    ctx.fillStyle = 'rgba(255,255,255,.7)';
    STARS.forEach(s => {
      const sy = (s.y + ts * s.spd * .08) % H;
      ctx.beginPath(); ctx.arc(s.x, sy, s.r, 0, Math.PI*2); ctx.fill();
    });
    drawStartChar();

  } else if (gs === 'playing' || gs === 'ending' || gs === 'gameover') {
    if (gs === 'playing') updateTimer(ts);
    updateVisual();
    applyShake();

    ctx.save();
    ctx.translate(shakeX, shakeY);

    drawBG();
    drawStairs();
    drawCharacter(
      pVisual.x,
      pVisual.y - 12,
      pReal.dir,
      pVisual.walkF,
      pVisual.hop
    );
    drawParticles();
    drawFlash();

    ctx.restore();
  }

  requestAnimationFrame(loop);
}

/* ─────────────────────────────────────────
   BUTTON FLASH
───────────────────────────────────────── */
function flashBtn(id) {
  const el = document.getElementById(id);
  el.classList.add('pressed');
  setTimeout(() => el.classList.remove('pressed'), 140);
}

/* ─────────────────────────────────────────
   DOM HELPERS
───────────────────────────────────────── */
function show(id) { document.getElementById(id).classList.remove('hidden'); }
function hide(id) { document.getElementById(id).classList.add('hidden'); }

/** 터치 후 click 중복 호출 방지 (모바일) */
function bindTap(el, handler) {
  let blockClick = false;
  el.addEventListener('touchstart', e => {
    e.preventDefault();
    blockClick = true;
    handler(e);
    setTimeout(() => { blockClick = false; }, 400);
  }, { passive: false });
  el.addEventListener('click', e => {
    if (blockClick) {
      e.preventDefault();
      return;
    }
    handler(e);
  });
}

/* ─────────────────────────────────────────
   EVENT LISTENERS
───────────────────────────────────────── */
bindTap(document.getElementById('startBtn'), startGame);
bindTap(document.getElementById('muteBtn'), toggleMute);
bindTap(document.getElementById('recordBtn'), openRecords);
bindTap(document.getElementById('backBtn'), () => hide('recordScreen'));

async function openRecords() {
  show('recordScreen');
  document.getElementById('mainRankList').innerHTML =
    `<tr><td colspan="4" style="text-align:center;padding:16px;color:rgba(255,255,255,.4)">📡 불러오는 중...</td></tr>`;

  const rankings = await loadRankings();
  renderRankTableBody('mainRankList', rankings);
}

const btnL = document.getElementById('btnL');
const btnR = document.getElementById('btnR');

btnL.addEventListener('touchstart', e => { e.preventDefault(); move(-1); });
btnR.addEventListener('touchstart', e => { e.preventDefault(); move(1); });
btnL.addEventListener('mousedown',  e => { if(e.button===0) move(-1); });
btnR.addEventListener('mousedown',  e => { if(e.button===0) move(1); });

window.addEventListener('keydown', e => {
  if (gs === 'start' && (e.key===' '||e.key==='Enter')) { startGame(); return; }
  if (e.key==='ArrowLeft'  || e.key.toLowerCase()==='z') move(-1);
  if (e.key==='ArrowRight' || e.key.toLowerCase()==='x') move(1);
});

/* ─────────────────────────────────────────
   roundRect polyfill (for older browsers)
───────────────────────────────────────── */
if (!CanvasRenderingContext2D.prototype.roundRect) {
  CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
    const R = typeof r === 'number' ? [r,r,r,r]
            : r.length === 1 ? [r[0],r[0],r[0],r[0]]
            : r.length === 2 ? [r[0],r[1],r[0],r[1]]
            : r.length === 3 ? [r[0],r[1],r[2],r[1]]
            : r;
    const [tl,tr,br,bl] = R;
    this.moveTo(x+tl, y);
    this.lineTo(x+w-tr, y);
    this.arcTo(x+w, y, x+w, y+tr, tr);
    this.lineTo(x+w, y+h-br);
    this.arcTo(x+w, y+h, x+w-br, y+h, br);
    this.lineTo(x+bl, y+h);
    this.arcTo(x, y+h, x, y+h-bl, bl);
    this.lineTo(x, y+tl);
    this.arcTo(x, y, x+tl, y, tl);
    this.closePath();
    return this;
  };
}

/* ─────────────────────────────────────────
   KICK OFF
───────────────────────────────────────── */
requestAnimationFrame(loop);

/* ─────────────────────────────────────────
   PWA – Service Worker 등록
───────────────────────────────────────── */
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').catch(() => {});
  });
}
</script>
