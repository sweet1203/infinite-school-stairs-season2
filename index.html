<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>영타 계단</title>
  <meta name="theme-color" content="#ff99c9">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="영타 계단">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
  <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
  <link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#f5f8ff; --panel:#ffffff; --line:#d6e2ff; --txt:#3b4262; --sub:#7f8bb2;
      --good:#31c48d; --bad:#ff7d91; --acc:#7f9bff;
      --app-height:100dvh;
    }
    *{box-sizing:border-box}
    body{
      margin:0; min-height:100vh; min-height:100dvh; color:var(--txt);
      font-family:"Jua","Pretendard","Apple SD Gothic Neo","Segoe UI",sans-serif;
      background:linear-gradient(180deg,#e9f3ff 0%,#ffeefe 100%);
    }
    .wrap{width:min(1200px,100vw - 32px); margin:16px auto; min-height:calc(var(--app-height) - 32px);}
    .screen{display:none; min-height:calc(var(--app-height) - 32px);}
    .screen.show{display:flex}
    .panel{
      width:100%; border:1px solid var(--line); border-radius:16px; background:rgba(17,26,49,.92);
      box-shadow:0 10px 28px rgba(109,131,196,.18);
    }

    /* main */
    #mainScreen{align-items:center; justify-content:center}
    .main-panel{
      max-width:760px; margin:auto; padding:36px 26px; text-align:center;
      background:linear-gradient(180deg,#1a0533 0%,#0d0d2b 100%);
      border-color:rgba(255,105,180,.35);
    }
    @keyframes glow {
      from { text-shadow:0 0 12px #ff69b4; }
      to   { text-shadow:0 0 35px #ff69b4, 0 0 70px #ff1493; }
    }
    @keyframes bounce {
      0%,100% { transform:translateY(0); }
      50%      { transform:translateY(-8px); }
    }
    h1{
      margin:0; font-size:clamp(42px,8vw,72px); letter-spacing:2px; color:#fff; animation:glow 2s ease-in-out infinite alternate;
    }
    .subtitle{margin-top:8px; color:rgba(255,255,255,.65); letter-spacing:2px}
    .menu{margin-top:30px; display:grid; gap:12px; justify-items:center}
    .menu button{
      width:min(420px,100%); border:0; border-radius:999px;
      background:linear-gradient(135deg,#ff69b4,#ff1493);
      color:#fff; font-size:clamp(22px,3.5vw,30px); font-weight:800; padding:16px 16px; cursor:pointer;
      box-shadow:0 6px 24px rgba(255,105,180,.5);
    }
    .menu button:nth-child(2){ background:linear-gradient(135deg,#8d7bff,#5b63ff); box-shadow:0 6px 24px rgba(120,120,255,.45); }
    .menu button:nth-child(3){ background:transparent; border:2px solid rgba(255,105,180,.55); color:#ff9ed0; box-shadow:none; }
    .menu button:hover{ transform:translateY(-1px); }
    .menu button:active{ transform:scale(.98); }
    .menu button small{display:block; font-size:13px; color:rgba(255,255,255,.85); margin-top:4px; font-weight:500}
    .menu button:nth-child(3) small{ color:rgba(255,158,208,.9); }
    .footer{margin-top:24px; color:rgba(255,255,255,.55); font-size:14px; letter-spacing:1px}

    /* game */
    #gameScreen{align-items:stretch}
    .game-panel{
      display:flex; flex-direction:column; padding:clamp(10px,1.7vw,16px); gap:clamp(7px,1.4dvh,12px);
      min-height:calc(var(--app-height) - 32px); overflow:hidden;
    }
    .top{
      display:flex; justify-content:space-between; align-items:center; gap:8px; color:#6f7ea8;
      font-size:clamp(14px,2.2vw,18px); font-weight:700;
    }
    .badge{
      border:1px solid #c8d7ff; border-radius:999px; background:linear-gradient(145deg,#ffffff,#eef4ff);
      padding:5px 12px; font-size:clamp(12px,2vw,15px); white-space:nowrap; color:#4b5a87;
    }
    .scene{
      flex:1 1 auto; min-height:clamp(240px,46dvh,430px);
      border:1px solid #c8d8ff; border-radius:12px; overflow:hidden; background:#dcecff;
    }
    #stairCanvas{display:block; width:100%; height:100%}
    .word{
      text-align:center; font-size:clamp(28px,5.2vw,64px); line-height:1.05; font-weight:900; letter-spacing:1px; min-height:1.08em; color:#495889;
      word-break:break-word;
    }
    .meaning{
      text-align:center; font-size:clamp(13px,2vw,18px); color:#8a95c0;
      min-height:1.3em; letter-spacing:0.3px; margin-top:-2px;
    }
    .input{
      width:100%; border:1px solid #c8d7ff; border-radius:14px; background:#fff; color:#44507b;
      font-size:clamp(20px,3.6vw,38px); padding:clamp(8px,1.5dvh,12px) 14px; font-family:"Consolas","Menlo",monospace; outline:none;
    }
    .input:focus{border-color:#95b0ff; box-shadow:0 0 0 2px rgba(149,176,255,.24)}
    .feedback{min-height:1.4em; font-weight:800; font-size:clamp(14px,2vw,18px)}
    .feedback.good{color:var(--good)} .feedback.bad{color:var(--bad)}
    .controls{display:flex; justify-content:space-between; gap:10px}
    .controls button{
      flex:1; border:0; border-radius:10px; padding:clamp(8px,1.4dvh,11px); cursor:pointer; font-size:clamp(13px,1.7vw,15px); font-weight:800;
      background:#e5edff; color:#51608f;
    }
    .controls button.primary{background:#ff99c9; color:#fff}

    /* rank */
    #rankScreen{align-items:center; justify-content:center}
    .rank-panel{max-width:760px; margin:auto; padding:24px;}
    .rank-head{display:flex; justify-content:space-between; align-items:center; gap:8px}
    .rank-title{font-size:clamp(24px,4vw,36px); font-weight:900}
    .rank-list{margin-top:14px; border:1px solid var(--line); border-radius:12px; padding:10px; max-height:56vh; overflow:auto}
    .row{display:flex; justify-content:space-between; border-bottom:1px solid rgba(168,182,219,.2); padding:7px 4px}
    .name{max-width:70%; white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
    /* 게임오버 모달 — 이름 저장 영역 */
    .go-save{display:flex; gap:8px; margin-top:10px}
    .go-save input{
      flex:1; border:1px solid #c8d7ff; border-radius:10px;
      background:#fff; color:#44507b; padding:10px 12px;
      font-size:15px; font-family:inherit; outline:none;
    }
    .go-save input:focus{border-color:#95b0ff;}
    .go-save button{
      border:0; border-radius:10px; background:#ff99c9;
      color:#fff; padding:10px 14px; font-weight:800; cursor:pointer; white-space:nowrap;
    }
    .go-save button:disabled{opacity:.4; cursor:not-allowed;}

    /* gameover modal */
    .modal{position:fixed; inset:0; display:none; align-items:center; justify-content:center; background:rgba(190,205,255,.45); z-index:20}
    .modal.show{display:flex}
    .card{width:min(540px,calc(100vw - 24px)); background:linear-gradient(145deg,#fff6fd,#eef3ff); border:1px solid #c8d7ff; border-radius:14px; padding:18px}
    .card h2{margin:0 0 8px; font-size:clamp(24px,4vw,34px)}
    .meta{color:var(--sub); margin-bottom:10px}
    .card-grid{display:grid; grid-template-columns:1fr 1fr; gap:8px}
    .box{border:1px solid #d8e2ff; border-radius:10px; padding:8px 10px; background:#fff}
    .box .k{color:var(--sub); font-size:12px}
    .box .v{font-size:20px; font-weight:900}

    @media (max-width: 700px){
      body.typing-active{overflow:hidden}
      .wrap{width:100vw; margin:0; min-height:var(--app-height);}
      .screen{min-height:var(--app-height);}
      .panel{border-radius:0}
      #mainScreen{padding:12px}
      .main-panel{border-radius:18px; padding:28px 18px}
      .game-panel{height:var(--app-height); min-height:var(--app-height); padding:10px; gap:8px}
      .top{align-items:flex-start; flex-wrap:wrap; line-height:1.1}
      .top > div:last-child{flex-wrap:wrap; justify-content:flex-end; gap:5px !important}
      .badge{padding:4px 9px; font-size:12px}
      .scene{min-height:clamp(250px,48dvh,430px)}
      .word{font-size:clamp(24px,8vw,40px); min-height:1em}
      .input{font-size:clamp(19px,6vw,27px); padding:9px 11px; border-radius:12px}
      .feedback{min-height:18px; font-size:13px}
      .controls{gap:8px}
      body.typing-active .game-panel{padding:6px 8px; gap:5px}
      body.typing-active .top{font-size:12px}
      body.typing-active .badge{padding:3px 7px; font-size:11px}
      body.typing-active .scene{flex:1 1 auto; min-height:0}
      body.typing-active .word{font-size:clamp(21px,6.6vw,30px); line-height:1; min-height:1em}
      body.typing-active .input{font-size:20px; padding:6px 10px; min-height:39px}
      body.typing-active .feedback,
      body.typing-active .controls{display:none}
    }

    @media (max-height: 680px){
      .game-panel{padding:8px; gap:6px}
      .scene{min-height:42dvh}
      .word{font-size:clamp(22px,5.2dvh,32px)}
      .input{font-size:clamp(18px,4.8dvh,24px); padding:7px 10px}
      .feedback{min-height:16px; font-size:12px}
      .controls button{padding:7px; font-size:13px}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section id="mainScreen" class="screen show">
      <div class="panel main-panel">
        <h1>영타 계단</h1>
        <div class="subtitle">영어 타자 연습 + 계단 올라가기</div>
        <div class="menu">
          <button id="btnWord">1. 단어 모드 <small>200초 타임어택</small></button>
          <button id="btnSentence">2. 문장 모드 <small>200초 타임어택</small></button>
          <button id="btnRank">3. 기록보기 <small>시즌2 TOP 10</small></button>
        </div>
        <div class="footer">대성여고 정보쌤 제작</div>
      </div>
    </section>

    <section id="gameScreen" class="screen">
      <div class="panel game-panel">
        <div class="top">
          <div id="modeLabel">단어 모드</div>
          <div style="display:flex; gap:8px; align-items:center">
            <div id="stairLabel" class="badge">계단 0칸</div>
            <div id="wordCountLabel" class="badge">단어 0개</div>
            <div id="scoreLabel" class="badge">점수 0</div>
            <div id="timeLabel" class="badge">시간 03:20</div>
          </div>
        </div>
        <div class="scene"><canvas id="stairCanvas" width="1100" height="320"></canvas></div>
        <div id="targetWord" class="word">start</div>
        <div id="wordMeaning" class="meaning"></div>
        <input id="wordInput" class="input" placeholder="타이핑 후 Enter" autocomplete="off" autocapitalize="none" autocorrect="off" inputmode="latin" spellcheck="false">
        <div id="feedback" class="feedback"></div>
        <div class="controls">
          <button id="btnBackMain">메인으로</button>
          <button id="btnRestart" class="primary">다시 시작</button>
        </div>
      </div>
    </section>

    <section id="rankScreen" class="screen">
      <div class="panel rank-panel">
        <div class="rank-head">
          <div class="rank-title">기록보기</div>
          <button id="btnRankBack" style="border:0;border-radius:9px;padding:9px 12px;background:#4b6fce;color:#fff;cursor:pointer">메인으로</button>
        </div>
        <div id="rankList" class="rank-list"></div>
      </div>
    </section>
  </div>

  <section id="gameoverModal" class="modal">
    <div class="card">
      <h2 id="goTitle">GAME OVER</h2>
      <div id="goMeta" class="meta"></div>
      <div class="card-grid">
        <div class="box"><div class="k">점수</div><div id="goScore" class="v">0</div></div>
        <div class="box"><div class="k">계단</div><div id="goStair" class="v">0</div></div>
        <div class="box"><div class="k">단어</div><div id="goWords" class="v">0개</div></div>
      </div>
      <!-- 이름 입력 + 기록 저장 -->
      <div class="go-save" style="margin-top:14px">
        <input id="goNameInput" maxlength="8" placeholder="이름 입력 (최대 8자)" autocomplete="off" />
        <button id="btnGoSave">기록 저장</button>
      </div>
      <div id="goSaveMsg" style="font-size:13px;color:#7f8bb2;margin-top:6px;min-height:18px"></div>
      <div style="display:flex; gap:8px; margin-top:10px">
        <button id="btnGoReplay" style="flex:1;border:0;border-radius:10px;padding:10px;background:#4b6fce;color:#fff;font-weight:800;cursor:pointer">다시 플레이</button>
        <button id="btnGoClose" style="flex:1;border:0;border-radius:10px;padding:10px;background:#2a3d71;color:#fff;font-weight:800;cursor:pointer">메인으로</button>
      </div>
    </div>
  </section>

  <script src="voca_words.js"></script>
  <script src="voca_meanings.js"></script>
  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyD52DVm_e0dGjEU4wplaInPDp2-oMA-DGA",
      authDomain: "english-stairs.firebaseapp.com",
      databaseURL: "https://english-stairs-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "english-stairs",
      storageBucket: "english-stairs.firebasestorage.app",
      messagingSenderId: "468902922942",
      appId: "1:468902922942:web:508ad271bc7b9b2f10acef",
      measurementId: "G-KC7N5R108E"
    };
    const RANK_PATH = "rankingsSeason2";
    const FIREBASE_DB_URL_KEY = "englishStairsFirebaseDbUrl";
    const LS_RANK_KEY = "typingS2LocalRank";
    const LIMIT_SEC = 200;

    const WORDS = Array.isArray(window.VOCA_WORDS) && window.VOCA_WORDS.length
      ? window.VOCA_WORDS
      : ["accordance","community","confidence","sustainable","workshop","phenomenon","architecture","leadership","evaluation","discipline","awareness","strategy","efficient","consequence","organization","recognition","investigation","template","clarity","original"];
    const SENTENCES = [
      "practice builds confidence",
      "small habits create big change",
      "focus on progress not perfection",
      "consistency beats intensity",
      "curiosity opens new possibilities"
    ];

    const el = {
      main: document.getElementById("mainScreen"),
      game: document.getElementById("gameScreen"),
      rank: document.getElementById("rankScreen"),
      btnWord: document.getElementById("btnWord"),
      btnSentence: document.getElementById("btnSentence"),
      btnRank: document.getElementById("btnRank"),
      btnBackMain: document.getElementById("btnBackMain"),
      btnRestart: document.getElementById("btnRestart"),
      btnRankBack: document.getElementById("btnRankBack"),
      modeLabel: document.getElementById("modeLabel"),
      stairLabel: document.getElementById("stairLabel"),
      scoreLabel: document.getElementById("scoreLabel"),
      timeLabel: document.getElementById("timeLabel"),
      targetWord: document.getElementById("targetWord"),
      wordInput: document.getElementById("wordInput"),
      feedback: document.getElementById("feedback"),
      stairCanvas: document.getElementById("stairCanvas"),
      rankList: document.getElementById("rankList"),
      gameover: document.getElementById("gameoverModal"),
      goTitle: document.getElementById("goTitle"),
      goMeta: document.getElementById("goMeta"),
      goScore: document.getElementById("goScore"),
      goStair: document.getElementById("goStair"),
      goWords: document.getElementById("goWords"),
      wordCountLabel: document.getElementById("wordCountLabel"),
      wordMeaning: document.getElementById("wordMeaning"),
      goNameInput: document.getElementById("goNameInput"),
      btnGoSave: document.getElementById("btnGoSave"),
      goSaveMsg: document.getElementById("goSaveMsg"),
      btnGoReplay: document.getElementById("btnGoReplay"),
      btnGoClose: document.getElementById("btnGoClose")
    };

    const state = {
      screen: "main",
      mode: "word",
      running: false,
      score: 0,
      stair: 0,
      words: 0,
      target: "",
      progressIdx: 0,
      timer: null,
      timeLeft: LIMIT_SEC,
      mood: "idle",
      moodUntil: 0
    };
    const targetBags = { word: [], sentence: [] };
    const STEP_MS = 270;
    const STEP_X = 92;
    const STEP_Y = 34;
    const STAIR_W = 160;
    const STAIR_H = 22;
    const STAIR_COUNT = 14;
    const scene = {
      cam: 0,
      visualStep: 0,
      stepFrom: 0,
      stepTo: 0,
      stepStartedAt: 0,
      stepAnimUntil: 0
    };
    const dogImage = new Image();
    dogImage.src = "dog.png"; // 사용자가 만든 강아지 캐릭터 파일
    const movingDogImage = new Image();
    movingDogImage.src = "dog_jump_sprite_8.png"; // 강아지만 누끼 딴 8프레임 점프 스프라이트
    let movingDogCanvas = null;
    movingDogImage.onload = () => {
      movingDogCanvas = movingDogImage;
    };
    const movingFrames = [
      { sx:   0, sy:0, sw:300, sh:320 },
      { sx: 300, sy:0, sw:300, sh:320 },
      { sx: 600, sy:0, sw:300, sh:320 },
      { sx: 900, sy:0, sw:300, sh:320 },
      { sx:1200, sy:0, sw:300, sh:320 },
      { sx:1500, sy:0, sw:300, sh:320 },
      { sx:1800, sy:0, sw:300, sh:320 },
      { sx:2100, sy:0, sw:300, sh:320 }
    ];

    let ac = null;
    function getAC(){ if(!ac) ac = new (window.AudioContext||window.webkitAudioContext)(); if(ac.state==="suspended") ac.resume(); return ac; }
    function tone(f,d=0.05,t="triangle",v=0.08,w=0){ const A=getAC(),T=A.currentTime+w,o=A.createOscillator(),g=A.createGain(); o.type=t;o.frequency.value=f;o.connect(g);g.connect(A.destination);g.gain.setValueAtTime(v,T);g.gain.exponentialRampToValueAtTime(0.0001,T+d);o.start(T);o.stop(T+d+0.02);}
    const sfx = {
      type: (c)=>tone(420+(c%12)*22,0.03,"triangle",0.05),
      good: ()=>[660,880].forEach((f,i)=>tone(f,0.07,"triangle",0.12,i*0.03)),
      bad: ()=>{tone(190,0.08,"square",0.1);tone(140,0.1,"sawtooth",0.08,0.05)},
      over: ()=>[523,440,349,262].forEach((f,i)=>tone(f,0.2,"triangle",0.11,i*0.08))
    };

    function show(screen){
      state.screen = screen;
      [el.main,el.game,el.rank].forEach(v=>v.classList.remove("show"));
      if(screen==="main") el.main.classList.add("show");
      if(screen==="game") el.game.classList.add("show");
      if(screen==="rank") el.rank.classList.add("show");
      syncMobileViewport();
    }

    function shuffle(list){
      const bag = list.slice();
      for (let i = bag.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [bag[i], bag[j]] = [bag[j], bag[i]];
      }
      return bag;
    }
    function refillTargetBag(mode){
      const source = mode === "word" ? WORDS : SENTENCES;
      const bag = shuffle(source);
      if (bag.length > 1 && bag[bag.length - 1] === state.target) {
        const swapIdx = bag.findIndex(item => item !== state.target);
        [bag[bag.length - 1], bag[swapIdx]] = [bag[swapIdx], bag[bag.length - 1]];
      }
      targetBags[mode] = bag;
    }
    function pick(){
      const mode = state.mode === "word" ? "word" : "sentence";
      if (!targetBags[mode].length) refillTargetBag(mode);
      let next = targetBags[mode].pop();
      if (next === state.target && targetBags[mode].length) {
        const alt = targetBags[mode].pop();
        targetBags[mode].push(next);
        next = alt;
      }
      return next;
    }
    function fmt(sec){ const m=Math.floor(sec/60), s=sec%60; return `${String(m).padStart(2,"0")}:${String(s).padStart(2,"0")}`; }
    function updateHUD(){
      el.scoreLabel.textContent=`점수 ${state.score}`;
      el.stairLabel.textContent=`계단 ${state.stair}칸`;
      el.timeLabel.textContent=`시간 ${fmt(state.timeLeft)}`;
      el.wordCountLabel.textContent=`단어 ${state.words}개`;
    }
    function showMeaning(word){
      const meanings = window.VOCA_MEANINGS || {};
      const m = meanings[word.toLowerCase()];
      el.wordMeaning.textContent = m || "";
    }
    function nextTarget(){
      state.target = pick();
      state.progressIdx = 0;
      el.targetWord.textContent = state.target;
      el.wordInput.value = "";
      showMeaning(state.target);
    }
    function react(m){ state.mood=m; state.moodUntil=Date.now()+420; }
    function feedback(msg, kind){ el.feedback.textContent=msg; el.feedback.className=`feedback ${kind||""}`; }
    function syncMobileViewport(){
      const vv = window.visualViewport;
      const h = vv ? vv.height : window.innerHeight;
      document.documentElement.style.setProperty("--app-height", `${Math.max(360, Math.round(h))}px`);
      const compactTyping = state.screen === "game"
        && document.activeElement === el.wordInput
        && window.matchMedia("(max-width: 700px)").matches;
      document.body.classList.toggle("typing-active", compactTyping);
      if (compactTyping) window.scrollTo(0, 0);
    }

    function start(mode){
      state.mode = mode;
      state.running = true;
      state.score = 0;
      state.stair = 0;
      state.words = 0;
      state.timeLeft = LIMIT_SEC;
      state.mood = "idle";
      resetScene();
      clearTimeout(state.timer);
      el.modeLabel.textContent = mode==="word" ? "단어 모드" : "문장 모드";
      feedback("", "");
      show("game");
      updateHUD();
      nextTarget();
      el.wordInput.focus();
      syncMobileViewport();
      setTimeout(syncMobileViewport, 120);
      getAC();
      tick();
    }

    function tick(){
      if(!state.running) return;
      state.timeLeft -= 1;
      updateHUD();
      if(state.timeLeft <= 0){ gameOver("시간 종료"); return; }
      state.timer = setTimeout(tick, 1000);
    }

    function resetScene(){
      scene.cam = 0;
      scene.visualStep = 0;
      scene.stepFrom = 0;
      scene.stepTo = 0;
      scene.stepStartedAt = 0;
      scene.stepAnimUntil = 0;
    }
    function beginStepMotion(from, to){
      const now = Date.now();
      scene.stepFrom = from;
      scene.stepTo = to;
      scene.stepStartedAt = now;
      scene.stepAnimUntil = now + STEP_MS;
    }
    function advanceSceneStep(){
      beginStepMotion(state.stair - 1, state.stair);
    }
    function getStepMotion(now){
      if (now >= scene.stepAnimUntil) {
        scene.visualStep = state.stair;
        return { active:false, t:1, visual:scene.visualStep };
      }
      const t = Math.min(1, Math.max(0, (now - scene.stepStartedAt) / STEP_MS));
      const eased = -(Math.cos(Math.PI * t) - 1) / 2;
      scene.visualStep = scene.stepFrom + (scene.stepTo - scene.stepFrom) * eased;
      return { active:true, t, visual:scene.visualStep };
    }

    function handleTypingKey(e){
      if(!state.running) return;
      const key = e.key;
      if (key === "Enter" || key === "Tab") {
        e.preventDefault();
        return;
      }
      if (key === "Backspace") {
        e.preventDefault();
        if (state.progressIdx > 0) {
          state.progressIdx -= 1;
          el.wordInput.value = state.target.slice(0, state.progressIdx);
          feedback("이전 글자로 돌아갔어요.", "");
        }
        return;
      }
      if (key.length !== 1) return;
      e.preventDefault();
      const expected = state.target[state.progressIdx];
      if (!expected) return;

      if (key.toLowerCase() === expected.toLowerCase()) {
        state.progressIdx += 1;
        state.stair += 1;   // 한 글자 맞출 때마다 +1칸
        state.score += 1;   // 점수도 글자 단위
        advanceSceneStep();
        react("good");
        sfx.type(key.charCodeAt(0));
        el.wordInput.value = state.target.slice(0, state.progressIdx);
        updateHUD();

        if (state.progressIdx >= state.target.length) {
          state.words += 1;
          updateHUD();
          sfx.good();
          feedback("단어 완료! 다음 문제로 넘어갑니다.", "good");
          setTimeout(() => {
            if (!state.running) return;
            nextTarget();
            feedback("", "");
          }, 180);
        }
      } else {
        react("bad");
        sfx.bad();
        feedback(`오타! 현재 글자 '${expected}'를 입력하세요.`, "bad");
      }
    }

    const LS_NAME_KEY = "typingS2LastName";

    function gameOver(reason){
      state.running = false;
      clearTimeout(state.timer);
      sfx.over();
      el.goTitle.textContent = "GAME OVER";
      el.goMeta.textContent = `${reason} · 이름을 입력하고 기록을 저장하세요!`;
      el.goScore.textContent = String(state.score);
      el.goStair.textContent = String(state.stair);
      el.goWords.textContent = `${state.words}개`;
      // 이전에 입력한 이름 자동 채우기
      el.goNameInput.value = localStorage.getItem(LS_NAME_KEY) || "";
      el.goSaveMsg.textContent = "";
      el.btnGoSave.disabled = false;
      el.btnGoSave.textContent = "기록 저장";
      el.gameover.classList.add("show");
      setTimeout(() => el.goNameInput.focus(), 100);
    }

    function drawChar(ctx,x,y,now,motion){
      const bad = state.mood==="bad", good=state.mood==="good";
      if (movingDogCanvas) {
        const active = motion && motion.active;
        const t = active ? motion.t : 0;
        const frameIdx = active ? Math.min(movingFrames.length - 1, Math.floor(t * movingFrames.length)) : 0;
        const f = movingFrames[frameIdx];
        const viewW = ctx.canvas.getBoundingClientRect().width || ctx.canvas.width;
        const scale = Math.max(0.46, Math.min(0.54, viewW / 760));
        const dw = f.sw * scale;
        const dh = f.sh * scale;
        const jump = active ? Math.sin(t * Math.PI) : 0;
        const lift = active ? jump * 16 : Math.sin(now * 0.01) * 1.5;
        const dir = 1;
        const lean = active ? 0.14 - t * 0.12 : 0;
        const landing = active && t > 0.8 ? (t - 0.8) / 0.2 : 0;
        const stretchY = active ? 1 + jump * 0.03 - landing * 0.04 : 1;
        const squashX = active ? 1 - jump * 0.02 + landing * 0.08 : 1;
        const shadowScale = active ? 1 - jump * 0.28 : 1;

        ctx.save();
        ctx.fillStyle = "rgba(0,0,0,.2)";
        ctx.beginPath(); ctx.ellipse(x + 4, y + 28, 30 * shadowScale, 8 * shadowScale, 0, 0, Math.PI * 2); ctx.fill();
        ctx.restore();

        ctx.save();
        ctx.translate(x, y - lift);
        ctx.scale(dir * squashX, stretchY);
        ctx.rotate(lean);
        ctx.drawImage(movingDogCanvas, f.sx, f.sy, f.sw, f.sh, -dw / 2, -dh + 24, dw, dh);
        ctx.restore();
        return;
      }
      if (dogImage.complete && dogImage.naturalWidth > 0) {
        // 계단 오르는 느낌: 진행값에 따라 상하 바운스 + 살짝 전방 기울기
        const phase = scene.cam * 0.9 + now * 0.01;
        const hop = Math.abs(Math.sin(phase)) * 5;
        const lean = -0.03 + Math.sin(phase) * 0.01;
        const w = 126;
        const h = w * (dogImage.naturalHeight / dogImage.naturalWidth);
        ctx.save();
        ctx.translate(x, y - hop);
        ctx.scale(-1, 1);
        ctx.rotate(lean);
        // 접지 그림자(발바닥 위치 기준)
        ctx.fillStyle="rgba(0,0,0,.2)";
        ctx.beginPath(); ctx.ellipse(4, 30, 30, 8, 0, 0, Math.PI*2); ctx.fill();
        // 발 위치가 계단 윗면에 닿도록 하단 정렬
        const footY = 34;
        ctx.drawImage(dogImage, -w / 2, footY - h, w, h);
        ctx.restore();
        return;
      }
      ctx.save(); ctx.translate(x,y+Math.sin(now*0.014)*2);
      ctx.fillStyle="rgba(0,0,0,.28)"; ctx.beginPath(); ctx.ellipse(0,20,17,5,0,0,Math.PI*2); ctx.fill();
      ctx.fillStyle=bad?"#ff9ba7":"#92c7ff"; ctx.beginPath(); ctx.roundRect(-13,-4,26,26,9); ctx.fill();
      ctx.fillStyle="#ffd66e"; ctx.beginPath(); ctx.arc(0,-18,14,0,Math.PI*2); ctx.fill();
      ctx.fillStyle="#2b2340"; ctx.beginPath(); ctx.arc(0,-22,14,Math.PI,Math.PI*2); ctx.fill();
      ctx.fillStyle="#ff5fa8"; ctx.beginPath(); ctx.ellipse(-12,-24,4,3,.2,0,Math.PI*2); ctx.fill();
      if(bad){
        ctx.strokeStyle="#1a1d2b"; ctx.lineWidth=2; ctx.beginPath();
        ctx.moveTo(-6,-19); ctx.lineTo(-2,-15); ctx.moveTo(-2,-19); ctx.lineTo(-6,-15);
        ctx.moveTo(6,-19); ctx.lineTo(2,-15); ctx.moveTo(2,-19); ctx.lineTo(6,-15); ctx.stroke();
      } else {
        ctx.fillStyle="#1a1d2b"; ctx.beginPath(); ctx.arc(-4.5,-17,1.8,0,Math.PI*2); ctx.fill(); ctx.beginPath(); ctx.arc(4.5,-17,1.8,0,Math.PI*2); ctx.fill();
      }
      ctx.strokeStyle="#8c3f44"; ctx.lineWidth=2; ctx.beginPath();
      if(bad) ctx.arc(0,-11,3.5,Math.PI*1.05,Math.PI*1.95);
      else if(good) ctx.arc(0,-12,4,0.1,Math.PI-0.1);
      else { ctx.moveTo(-2,-11); ctx.lineTo(2,-11); }
      ctx.stroke();
      ctx.restore();
    }

    function fitCanvasToDisplay(){
      const c = el.stairCanvas;
      const rect = c.getBoundingClientRect();
      const dpr = Math.min(window.devicePixelRatio || 1, 2);
      const cssW = Math.max(1, Math.round(rect.width || c.clientWidth || 1100));
      const cssH = Math.max(1, Math.round(rect.height || c.clientHeight || 320));
      const nextW = Math.round(cssW * dpr);
      const nextH = Math.round(cssH * dpr);
      if (c.width !== nextW || c.height !== nextH) {
        c.width = nextW;
        c.height = nextH;
      }
      const ctx = c.getContext("2d");
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      return { ctx, w:cssW, h:cssH };
    }

    function drawScene(){
      const { ctx, w, h } = fitCanvasToDisplay();
      const now=Date.now();
      if(state.moodUntil < now) state.mood="idle";
      ctx.clearRect(0,0,w,h);
      const g = ctx.createLinearGradient(0,0,0,h); g.addColorStop(0,"#bfe0ff"); g.addColorStop(1,"#ffe0f7");
      ctx.fillStyle=g; ctx.fillRect(0,0,w,h);
      const motion = getStepMotion(now);
      const leadSteps = w < 520 ? 1.25 : 2.1;
      const cameraTarget = Math.max(0, motion.visual - leadSteps);
      scene.cam += (cameraTarget - scene.cam) * 0.22;
      const cam = scene.cam;
      const start = Math.floor(cam) - 3;
      const end = start + STAIR_COUNT;
      const sizeScale = Math.max(0.72, Math.min(1, w / 760));
      const stepX = STEP_X * sizeScale;
      const stepY = STEP_Y * sizeScale;
      const stairW = STAIR_W * sizeScale;
      const stairH = STAIR_H * Math.max(0.85, sizeScale);
      const baseX = w < 520 ? Math.max(128, w * 0.36) : Math.min(230, w * 0.24);
      const riserH = Math.max(6, stepY - stairH + 4);  // 앞면 높이

      for (let i=start; i<end; i++){
        const rel = i - cam;
        const x = baseX + rel * stepX - stairW / 2;
        const y = h - 46 - rel * stepY;
        if(x<-stairW||x>w+stairW||y<-60||y>h+60) continue;
        const completed = i >= 0 && i < state.stair;
        const isCurrent = i === state.stair;

        // ── 그림자 ──
        ctx.fillStyle = "rgba(0,0,0,.13)";
        ctx.beginPath();
        ctx.roundRect(x + 4*sizeScale, y + stairH + riserH - 2, stairW, 7*sizeScale, 4);
        ctx.fill();

        // ── 앞면(riser) — 3D 효과의 핵심 ──
        if (completed) {
          const rf = ctx.createLinearGradient(x, y+stairH, x+stairW, y+stairH);
          rf.addColorStop(0, "#c0306a");
          rf.addColorStop(1, "#e0609a");
          ctx.fillStyle = rf;
        } else if (isCurrent) {
          ctx.fillStyle = "#e8a8cc";
        } else {
          ctx.fillStyle = "rgba(195,205,235,.85)";
        }
        ctx.beginPath();
        ctx.roundRect(x, y + stairH, stairW, riserH, [0, 0, 5, 5]);
        ctx.fill();

        // ── 윗면(tread) ──
        if (completed) {
          const tf = ctx.createLinearGradient(x, y, x+stairW, y);
          tf.addColorStop(0, "#ff69b4");
          tf.addColorStop(1, "#ffb0d8");
          ctx.fillStyle = tf;
        } else if (isCurrent) {
          ctx.fillStyle = "#ffdcf0";
        } else {
          ctx.fillStyle = "rgba(255,255,255,.93)";
        }
        ctx.beginPath();
        ctx.roundRect(x, y, stairW, stairH, [6, 6, 3, 3]);
        ctx.fill();

        // ── 윗면 하이라이트 ──
        ctx.fillStyle = "rgba(255,255,255,.5)";
        ctx.fillRect(x + 10*sizeScale, y + 3*sizeScale, stairW - 20*sizeScale, 3*sizeScale);

        // ── 테두리 ──
        ctx.strokeStyle = completed ? "rgba(220,100,170,.4)" : "rgba(180,170,240,.35)";
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.roundRect(x, y, stairW, stairH, [6, 6, 3, 3]);
        ctx.stroke();
      }
      const dogRel = motion.visual - cam;
      const dogX = baseX + dogRel * stepX;
      const dogY = h - 70 * sizeScale - dogRel * stepY;
      drawChar(ctx,dogX,dogY,now,motion);
      requestAnimationFrame(drawScene);
    }

    function esc(s){ return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/\"/g,"&quot;").replace(/'/g,"&#39;"); }
    function sanitizeName(raw){ const s=String(raw).trim().slice(0,8).replace(/[<>&"'`]/g,""); return s||"익명"; }
    function localRead(){ try{return JSON.parse(localStorage.getItem(LS_RANK_KEY)||"[]")}catch{return []} }
    function localWrite(rows){ localStorage.setItem(LS_RANK_KEY, JSON.stringify(rows.slice(0,10))); }
    function firebaseDbUrlCandidates(){
      const saved = localStorage.getItem(FIREBASE_DB_URL_KEY);
      const urls = [
        saved,
        firebaseConfig.databaseURL,
        `https://${firebaseConfig.projectId}-default-rtdb.firebaseio.com`
      ];
      return urls.filter((url, idx, arr) => url && arr.indexOf(url) === idx);
    }
    async function firebaseRequest(path, options){
      let lastError;
      for (const url of firebaseDbUrlCandidates()) {
        try {
          const res = await fetch(`${url}/${path}.json`, options);
          const data = await res.json().catch(() => null);
          if (res.status === 404) {
            lastError = new Error("Firebase database URL not found");
            continue;
          }
          if (!res.ok || data?.error) throw new Error(data?.error || `HTTP ${res.status}`);
          localStorage.setItem(FIREBASE_DB_URL_KEY, url);
          return data;
        } catch (error) {
          lastError = error;
          if (/Permission denied/i.test(error.message)) break;
        }
      }
      localStorage.removeItem(FIREBASE_DB_URL_KEY);
      throw lastError || new Error("Firebase database unavailable");
    }

    function renderRank(rows){
      if(!rows.length){ el.rankList.innerHTML="<div class='row'><span>아직 기록이 없어요.</span></div>"; return; }
      el.rankList.innerHTML = rows.map((r,i)=>`
        <div class="row">
          <span class="name">${i+1}. ${esc(r.name)} <small style="color:#aab">${r.mode==="W"?"단어":"문장"}</small></span>
          <span style="display:flex;gap:12px;align-items:center">
            ${r.words ? `<small style="color:#8a95c0">${Number(r.words)}단어</small>` : ''}
            <strong>${Number(r.score)||0}점</strong>
          </span>
        </div>`).join("");
    }
    function renderRankError(message){
      const local = localRead();
      const localHtml = local.length
        ? local.slice(0,10).map((r,i)=>`<div class="row"><span class="name">${i+1}. ${esc(r.name)} <small>로컬</small></span><strong>${Number(r.score)||0}</strong></div>`).join("")
        : "<div class='row'><span>이 브라우저에도 임시 기록이 없어요.</span></div>";
      el.rankList.innerHTML = `<div class="row"><span>${esc(message)}</span></div>${localHtml}`;
    }
    async function loadRank(){
      try{
        const data = await firebaseRequest(RANK_PATH);
        const rows = data && typeof data === "object" ? Object.values(data) : [];
        rows.sort((a,b)=>(Number(b.score)||0)-(Number(a.score)||0));
        const top=rows.slice(0,10); localWrite(top); renderRank(top);
      }catch(e){
        console.warn("Firebase 랭킹 불러오기 실패:", e);
        renderRankError("Firebase 연결/권한 오류: Realtime Database 설정과 rules 배포를 확인해주세요.");
      }
    }
    async function saveRankFromModal(){
      const name = sanitizeName(el.goNameInput.value);
      if (!name) { el.goSaveMsg.textContent = "이름을 입력해주세요!"; return; }
      const row = { name, score: state.score, stair: state.stair, words: state.words, mode: state.mode==="word"?"W":"S", ts: Date.now() };
      // 이름 기억
      localStorage.setItem(LS_NAME_KEY, name);
      el.btnGoSave.disabled = true;
      el.btnGoSave.textContent = "저장 중...";
      try {
        await firebaseRequest(RANK_PATH, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(row)
        });
        el.goSaveMsg.textContent = `✅ ${name} · ${state.score}점 저장됐어요!`;
        el.btnGoSave.textContent = "저장 완료";
      } catch(e) {
        console.warn("Firebase 저장 실패, 로컬에만 저장:", e);
        const rows = localRead(); rows.push(row);
        rows.sort((a,b)=>(Number(b.score)||0)-(Number(a.score)||0)); localWrite(rows);
        el.goSaveMsg.textContent = `📱 ${name} · ${state.score}점 (이 기기에 저장됨)`;
        el.btnGoSave.textContent = "저장 완료";
      }
    }

    el.btnWord.addEventListener("click", ()=>start("word"));
    el.btnSentence.addEventListener("click", ()=>start("sentence"));
    el.btnRank.addEventListener("click", ()=>{ show("rank"); loadRank(); });
    el.btnRankBack.addEventListener("click", ()=>show("main"));
    el.btnBackMain.addEventListener("click", ()=>{ state.running=false; clearTimeout(state.timer); show("main"); });
    el.btnRestart.addEventListener("click", ()=>start(state.mode));
    el.wordInput.addEventListener("keydown", handleTypingKey);
    el.wordInput.addEventListener("focus", ()=>{ syncMobileViewport(); setTimeout(syncMobileViewport, 120); });
    el.wordInput.addEventListener("blur", syncMobileViewport);
    window.addEventListener("resize", syncMobileViewport);
    if (window.visualViewport) {
      window.visualViewport.addEventListener("resize", syncMobileViewport);
      window.visualViewport.addEventListener("scroll", syncMobileViewport);
    }
    // 게임오버 모달 — 기록 저장
    el.btnGoSave.addEventListener("click", saveRankFromModal);
    el.goNameInput.addEventListener("keydown", e => {
      if (e.key === "Enter" && !e.isComposing) saveRankFromModal();
    });
    el.btnGoReplay.addEventListener("click", ()=>{ el.gameover.classList.remove("show"); start(state.mode); });
    el.btnGoClose.addEventListener("click", ()=>{ el.gameover.classList.remove("show"); show("main"); });

    syncMobileViewport();
    drawScene();
    loadRank();
  </script>
</body>
</html>
